name: Update README trophy

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy card (light)
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=${{ github.repository_owner }}&theme=default&column=7&margin-w=15&margin-h=15&no-bg=true'
          path: Assets/trophy-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy card (dark)
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=${{ github.repository_owner }}&theme=darkhub&column=7&margin-w=15&margin-h=15&no-bg=true'
          path: Assets/trophy-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Assets/trophy-light.svg Assets/trophy-dark.svg
          git commit -m "Update README trophy" || exit 0
          git push
