name: generate monkeytype readme svg
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  download-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download SVG (Dark)
        run: |
          mkdir -p public-dark
          curl -L -o public-dark/monkeytype-readme.svg \
          https://monkeytype-production.up.railway.app/generate-svg/Tajkir_Hossen/vesper
          curl -L -o public-dark/monkeytype-readme-pb.svg \
          "https://monkeytype-production.up.railway.app/generate-svg/Tajkir_Hossen/vesper?pb=true"
      - name: Push Dark SVG
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: monkeytype-readme-dark
          build_dir: public-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SVG (Light)
        run: |
          mkdir -p public-light
          curl -L -o public-light/monkeytype-readme.svg \
          https://monkeytype-production.up.railway.app/generate-svg/Tajkir_Hossen/vesper_light
          curl -L -o public-light/monkeytype-readme-pb.svg \
          "https://monkeytype-production.up.railway.app/generate-svg/Tajkir_Hossen/vesper_light?pb=true"
      - name: Push Light SVG
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: monkeytype-readme-light
          build_dir: public-light
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
