name: generate monkeytype readme svg

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  download-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Generate Monkeytype Readme SVG (Dark)
        uses: monkeytype-hub/monkeytype-readme@v1.0.0
        with:
          username: Tajkir_Hossen
          themes: vesper
          target-branch: monkeytype-readme-dark
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Monkeytype Readme SVG (Light)
        uses: monkeytype-hub/monkeytype-readme@v1.0.0
        with:
          username: Tajkir_Hossen
          themes: vesper_light
          target-branch: monkeytype-readme-light
          github-token: ${{ secrets.GITHUB_TOKEN }}
